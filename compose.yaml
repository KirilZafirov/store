name: retail-cart
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cart
      POSTGRES_USER: cart
      POSTGRES_PASSWORD: cart
    ports: ["55432:5432"]
    volumes: ["cart-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cart -d cart"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports: ["56379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/Cart.Api/Dockerfile
    environment:
      ConnectionStrings__CartDatabase: Host=postgres;Port=5432;Database=cart;Username=cart;Password=cart
      ConnectionStrings__Redis: redis:6379
      AllowedOrigin: http://localhost:5173
      ApplyMigrations: "true"
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  web:
    build:
      context: frontend
      args: { VITE_API_URL: "http://localhost:8080" }
    ports: ["5173:80"]
    depends_on: [api]

volumes:
  cart-data:
