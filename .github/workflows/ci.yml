name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend build, format, tests, audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Restore locked .NET dependencies
        run: dotnet restore RetailPlatform.slnx --locked-mode

      - name: Verify .NET formatting
        run: dotnet format RetailPlatform.slnx --verify-no-changes --no-restore

      - name: Build backend
        run: dotnet build RetailPlatform.slnx -c Release --no-restore

      - name: Test backend
        run: dotnet test RetailPlatform.slnx -c Release --no-build --collect:"XPlat Code Coverage" --logger trx --results-directory TestResults

      - name: Audit NuGet dependencies
        run: bash scripts/ci/nuget-audit.sh

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            nuget-audit.txt
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml

  frontend:
    name: Frontend lint, tests, build, browser smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked npm dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm test -- --coverage

      - name: Build frontend
        run: npm run build

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Install Playwright Chromium
        run: npm run e2e:install

      - name: Start API dependencies for browser tests
        working-directory: .
        run: docker compose up -d postgres api

      - name: Wait for browser-test API
        working-directory: .
        run: |
          for i in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/health/ready; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs --no-color api
          exit 1

      - name: Run browser workflow tests
        env:
          E2E_API_URL: http://127.0.0.1:8080
        run: npm run e2e

      - name: Upload frontend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            frontend/coverage
            frontend/playwright-report
            frontend/test-results

  containers:
    name: Container build, scan, SBOM
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: .
            dockerfile: src/Cart.Api/Dockerfile
            local_tag: atlas-cart-api
          - image: web
            context: frontend
            dockerfile: frontend/Dockerfile
            local_tag: atlas-cart-web
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build image for verification
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: ${{ matrix.local_tag }}:${{ github.sha }}

      - name: Scan image for high and critical vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.local_tag }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Generate image SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.local_tag }}:${{ github.sha }}
          format: cyclonedx
          output: sbom-cart-${{ matrix.image }}.cdx.json
          exit-code: 0

      - name: Upload image SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cart-${{ matrix.image }}
          path: sbom-cart-${{ matrix.image }}.cdx.json

  publish-containers:
    name: Publish immutable containers
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [containers]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: .
            dockerfile: src/Cart.Api/Dockerfile
            remote_tag: ghcr.io/kirilzafirov/store/cart-api
          - image: web
            context: frontend
            dockerfile: frontend/Dockerfile
            remote_tag: ghcr.io/kirilzafirov/store/cart-web
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish SHA-tagged image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ matrix.remote_tag }}:${{ github.sha }}

  compose-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    needs: [containers]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Start full Compose stack
        run: docker compose up --build -d

      - name: Run API and storefront smoke checks
        run: bash scripts/ci/compose-smoke.sh

      - name: Upload Compose logs
        if: always()
        run: docker compose logs --no-color > compose-smoke.log

      - name: Store Compose logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-smoke-logs
          path: compose-smoke.log
