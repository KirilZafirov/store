name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { global-json-file: global.json }
      - run: dotnet restore RetailPlatform.slnx --locked-mode
      - run: dotnet build RetailPlatform.slnx -c Release --no-restore
      - run: dotnet test RetailPlatform.slnx -c Release --no-build --collect:"XPlat Code Coverage" --logger trx
      - run: dotnet list RetailPlatform.slnx package --vulnerable --include-transitive

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high

  containers:
    if: github.event_name != 'pull_request'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    strategy: { matrix: { image: [api, web] } }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/build-push-action@v6
        with:
          context: "${{ matrix.image == 'api' && '.' || './frontend' }}"
          file: "${{ matrix.image == 'api' && './src/Cart.Api/Dockerfile' || './frontend/Dockerfile' }}"
          push: true
          tags: ghcr.io/${{ github.repository }}/cart-${{ matrix.image }}:${{ github.sha }}
